<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wang'ap — Guide / Guide utilisateur</title>
  <meta name="description" content="Guide complet de l'application Wang'ap — par niveau (public, famille, skipper) et par fonctionnalité." />
  <style>
    :root {
      --night:#0B1026; --navy:#162447; --blue:#1F4068; --teal:#1B9AAA;
      --gold:#E8B059; --gold-deep:#B07820; --coral:#E07A5F; --sand:#F4F1DE;
      --cream:#FFFCF2; --slate:#3D405B; --gray:#8D99AE;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--slate); background:var(--cream); line-height:1.6; -webkit-font-smoothing:antialiased; }
    a { color:var(--teal); }
    header.top { position:sticky; top:0; z-index:50; background:linear-gradient(180deg,var(--night) 0%,var(--navy) 100%); color:var(--sand); padding:14px 18px; box-shadow:0 2px 14px rgba(0,0,0,.25); }
    .top-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; max-width:1080px; margin:0 auto; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; letter-spacing:.5px; }
    .brand .logo { width:34px; height:34px; border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .brand small { display:block; font-weight:500; font-size:11px; color:var(--gold); letter-spacing:0; }
    .spacer { flex:1; }
    .search { flex:1 1 240px; min-width:180px; max-width:420px; position:relative; }
    .search input { width:100%; padding:9px 12px 9px 32px; border-radius:10px; border:none; background:rgba(255,255,255,.95); color:var(--slate); font-size:14px; }
    .search::before { content:'🔍'; position:absolute; left:10px; top:8px; font-size:13px; opacity:.6; }
    .lang-toggle { display:flex; background:rgba(255,255,255,.12); border-radius:9px; overflow:hidden; }
    .lang-toggle button { border:none; background:transparent; color:var(--sand); padding:7px 12px; cursor:pointer; font-weight:700; font-size:12px; }
    .lang-toggle button.active { background:var(--gold); color:var(--night); }
    .back-app { color:var(--sand); text-decoration:none; font-size:12px; opacity:.85; border:1px solid rgba(255,255,255,.25); padding:6px 11px; border-radius:9px; white-space:nowrap; }
    .back-app:hover { opacity:1; }
    .tabs { max-width:1080px; margin:0 auto; padding:14px 18px 0; display:flex; gap:8px; flex-wrap:wrap; }
    .tab { border:1px solid rgba(0,0,0,.08); background:#fff; color:var(--slate); padding:8px 16px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600; }
    .tab.active { background:var(--navy); color:var(--sand); border-color:var(--navy); }
    main { max-width:1080px; margin:0 auto; padding:16px 18px 60px; }
    .lead { font-size:14px; color:var(--gray); margin:6px 2px 18px; }
    .count { font-size:12px; color:var(--gray); margin:2px 2px 14px; }
    .card { background:#fff; border-radius:16px; padding:18px 20px; margin-bottom:16px; box-shadow:0 1px 8px rgba(0,0,0,.05); border:1px solid rgba(0,0,0,.04); }
    .card h3 { font-size:17px; color:var(--navy); display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
    .card h3 .icon { font-size:20px; }
    .badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }
    .badge.public { background:#e4f3f5; color:#0d7a8a; }
    .badge.family { background:#fde8ec; color:#b23a52; }
    .badge.skipper { background:rgba(232,176,89,.2); color:var(--gold-deep); }
    .card .desc { margin:10px 0 0; font-size:14.5px; }
    .card ul { margin:9px 0 0 2px; padding-left:18px; }
    .card ul li { margin-bottom:5px; font-size:13.5px; }
    .card ul li b { color:var(--navy); }
    .card .note { margin-top:10px; font-size:12.5px; color:var(--gray); background:var(--sand); border-radius:9px; padding:8px 11px; }
    /* Screenshots — small clickable thumbnails (click to open full size) */
    figure.shot { margin:12px 0 2px; }
    figure.shot a.shotlink { display:inline-block; line-height:0; }
    figure.shot img { max-width:300px; max-height:440px; width:auto; height:auto; border-radius:10px; border:1px solid rgba(0,0,0,.12); display:block; cursor:zoom-in; }
    .shot-ph { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:5px; width:300px; max-width:100%; min-height:120px; border:2px dashed var(--gold); border-radius:10px; background:repeating-linear-gradient(45deg,#fff,#fff 12px,#fdf6e8 12px,#fdf6e8 24px); color:var(--gold-deep); text-align:center; padding:14px; }
    .shot-ph .num { font-size:20px; font-weight:800; }
    .shot-ph .cap { font-size:11.5px; color:var(--slate); }
    .shot-ph .path { font-size:10px; color:var(--gray); font-family:ui-monospace,Menlo,monospace; }
    figcaption { font-size:11px; color:var(--gray); margin-top:4px; }
    .no-results { text-align:center; padding:50px 20px; color:var(--gray); }
    footer { max-width:1080px; margin:0 auto; padding:24px 18px 60px; border-top:1px solid rgba(0,0,0,.08); color:var(--gray); font-size:13px; }
    footer a { margin-right:14px; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div class="brand"><span class="logo">⛵</span><span>wang'ap<small data-i18n="subtitle">Guide utilisateur</small></span></div>
      <div class="spacer"></div>
      <div class="search"><input id="q" type="search" autocomplete="off" /></div>
      <div class="lang-toggle">
        <button id="lang-fr" onclick="setLang('fr')">FR</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
      </div>
      <a class="back-app" href="/" data-i18n="backApp">← l'app</a>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <main>
    <p class="lead" id="lead"></p>
    <p class="count" id="count"></p>
    <div id="cards"></div>
    <div class="no-results hidden" id="noResults"></div>
  </main>
  <footer><p id="footerLinks" style="margin-bottom:10px;"></p><p id="footerNote"></p></footer>

        '<b>Publish</b> or <b>Draft</b>; offline writing (sync queue); ✏️ edit / 🗑 delete (permanent).']},

    { id:'sk-mapedit', level:'skipper', icon:'✂️', shot:19,
      t:{fr:'Carte : affichage & édition de la trace',en:'Map: display & track editing'},
      d:{fr:"Choisir ce qu’on affiche, puis corriger et nettoyer la trace GPS.",en:'Choose what is shown, then fix and clean the GPS track.'},
      bullets:{fr:[
        '<b>Afficher / masquer les couches</b> : 📷 Posts · ✿ Tracé · 🗺 Plan (route prévue) · 📍 Marks ; filtre par chapitre / étape ; fond marin nautique (OpenSeaMap / ESRI).',
        'Bouton <b>✂️ Édition tracé</b> : les waypoints deviennent des cercles cliquables.',
        '<b>Glisser</b> un waypoint pour le repositionner ; tap = sélection, second tap = sélection d’une <b>plage</b>.',
        '<b>Supprimer en lot</b> : batché par 200 (limite PostgREST), toast de résultat (vert / orange partiel / rouge).',
        '<b>Forcer une étape</b> sur la sélection ; <b>décaler les dates</b> d’une période.',
        '<b>Créer une nouvelle trace</b> à la main, point par point (source = manual, dates interpolées), quand la balise a manqué une portion.',
        '<b>Simplifier la trace</b> (Douglas-Peucker) avec aperçu et <b>annulation</b> pendant quelques secondes.',
        '<b>Réglages → 🛠 Trace : visualisation et maintenance</b> : <b>tolérance de simplification au zoom</b> (optimisation du rendu — moins de points au zoom faible), <b>détection des coupures</b> (la trace se scinde en segments, les « lignes de rupture », dès que l’écart de temps dépasse N h ou la vitesse implicite N nœuds), et historique de maintenance des waypoints.'],
        en:[
        '<b>Show / hide layers</b>: 📷 Posts · ✿ Track · 🗺 Plan (planned route) · 📍 Marks; filter by chapter / leg; nautical chart (OpenSeaMap / ESRI).',
        '<b>✂️ Edit track</b> button: waypoints become tappable circles.',
        '<b>Drag</b> a waypoint to reposition; tap = select, second tap = select a <b>range</b>.',
        '<b>Bulk delete</b>: batched in 200s (PostgREST limit), result toast (green / orange partial / red).',
        '<b>Force a leg</b> on the selection; <b>shift dates</b> of a period.',
        '<b>Create a new track</b> by hand, point by point (source = manual, interpolated dates), when the tracker missed a section.',
        '<b>Simplify the track</b> (Douglas-Peucker) with a preview and <b>undo</b> for a few seconds.',
        '<b>Settings → 🛠 Track: visualisation &amp; maintenance</b>: <b>zoom simplification tolerance</b> (render optimisation — fewer points at low zoom), <b>gap detection</b> (the track splits into segments, the "break lines", once the time gap exceeds N h or implied speed N knots), and waypoint maintenance history.']},
      cap:{fr:'Carte en mode édition tracé.',en:'Map in track-edit mode.'} },

    { id:'sk-chapters', level:'skipper', icon:'📚', shot:21,
      t:{fr:'Chapitres, étapes & visibilité',en:'Chapters, legs & visibility'},
      d:{fr:"Organiser le voyage en chapitres et étapes.",en:'Organise the voyage into chapters and legs.'},
      bullets:{fr:[
        'Hiérarchie : <b>Chapitre</b> (mois/région) → <b>Étape</b> (port → port) → posts + waypoints.',
        'Réglages → <b>📚 Chapitres</b> : créer, renommer, <b>réordonner ▲▼</b>, choisir la couleur, supprimer (confirmation).',
        'Réglages → <b>🚢 Étapes</b> : nom (Port A → Port B), chapitre parent, ports de départ/arrivée, dates prévues. Les dates fixent l’assignation par défaut des nouveaux posts.',
        '<b>Suppression sûre</b> : les posts/waypoints orphelins tombent dans « Non classés » (chapitre/étape sentinelle immuable) — jamais perdus.',
        '<b>Masquer un chapitre</b> (œil barré) : disparaît de l’app, mais reste lisible par les sauvegardes, l’archive, les stats et le Renard (visibilité, pas confidentialité).'],
        en:[
        'Hierarchy: <b>Chapter</b> (month/region) → <b>Leg</b> (port → port) → posts + waypoints.',
        'Settings → <b>📚 Chapters</b>: create, rename, <b>reorder ▲▼</b>, pick the colour, delete (confirm).',
        'Settings → <b>🚢 Legs</b>: name (Port A → Port B), parent chapter, start/end ports, planned dates. Dates set the default assignment of new posts.',
        '<b>Safe delete</b>: orphan posts/waypoints fall into "Unsorted" (immutable sentinel chapter/leg) — never lost.',
        '<b>Hide a chapter</b> (eye-off): disappears from the app, but stays readable by backups, the archive, stats and Le Renard (visibility, not privacy).']},
      cap:{fr:'Chapitres & étapes + toggle visibilité.',en:'Chapters & legs + visibility toggle.'} },

    { id:'sk-position', level:'skipper', icon:'🎯', shot:22,
      t:{fr:'Position manuelle & visibilité publique',en:'Manual position & public visibility'},
      d:{fr:"Maîtriser ce que voient les visiteurs.",en:'Control what visitors see.'},
      bullets:{fr:[
        '<b>Position manuelle</b> : forcer un point précis quand l’AIS est éteint. Le résolveur prend la plus récente entre point manuel et waypoint visible, avec un tampon « collant » d’1 h qui protège un geste humain récent.',
        '<b>Visibilité publique</b> : afficher la position <b>en direct</b>, <b>différée</b> (avec délai) ou <b>figée</b> pour le public.',
        'Famille et skippers voient la position réelle ; le public voit la version choisie — <b>par audience, pas par hasard</b>.'],
        en:[
        '<b>Manual position</b>: force a precise point when AIS is off. The resolver takes the most recent of manual point vs visible waypoint, with a 1 h "sticky" buffer protecting a recent human gesture.',
        '<b>Public visibility</b>: show the position <b>live</b>, <b>delayed</b> (with a buffer) or <b>frozen</b> for the public.',
        'Family and skippers see the real position; the public sees the chosen version — <b>per audience, by design</b>.']},
      cap:{fr:'Position manuelle + visibilité publique.',en:'Manual position + public visibility.'} },

    { id:'sk-ais', level:'skipper', icon:'📡', shot:23,
      t:{fr:'AIS — suivi en direct',en:'AIS — live tracking'},
      d:{fr:"La configuration du suivi automatique du bateau.",en:'The automatic boat-tracking configuration.'},
      bullets:{fr:[
        '<b>Bateau suivi</b> : nom, MMSI (9 chiffres), indicatif, pavillon, <b>fournisseur</b> (aisstream), <b>clé API</b> — partagé entre tous les skippers.',
        '<b>État du worker</b> : Éteint / En attente du 1er message / Actif (N min) / Inactif / Limité (réessai auto) / Erreur.',
        '<b>Flux DB</b> : pastille verte ≤ 10 min, gold ≤ 60 min, rouge au-delà — confirme l’écriture en base.',
        '<b>Filtre anti-jitter</b> (rejette les points trop proches) réglable en avancé ; <b>pause manuelle</b> au port.'],
        en:[
        '<b>Tracked boat</b>: name, MMSI (9 digits), call sign, flag, <b>provider</b> (aisstream), <b>API key</b> — shared across all skippers.',
        '<b>Worker status</b>: Off / Waiting for 1st message / Active (N min) / Inactive / Rate-limited (auto retry) / Error.',
        '<b>DB feed</b>: green ≤ 10 min, gold ≤ 60 min, red beyond — confirms writes to the database.',
        '<b>Anti-jitter filter</b> (rejects points too close together) tunable in advanced; <b>manual pause</b> in port.']},
      note:{fr:'Le silence AIS au port est normal. Seul un Flux DB rouge en mer (bateau en marche) est suspect.',en:'AIS silence in port is normal. Only a red DB feed at sea (boat under way) is suspicious.'},
      cap:{fr:'Config AIS + état + Flux DB.',en:'AIS config + status + DB feed.'} },

      bullets:{fr:[
        '<b>Composition par sections</b> : titre, collage photo (grille avec suggestions IA), carte auto-générée, métriques (distance/jours/escales/posts/photos/vitesse max), texte (éditeur TipTap), équipage (filtré sur la période).',

  let lang='fr', tab='all';
  function setLang(l){
    lang=(l==='en')?'en':'fr';
    localStorage.setItem('lang', lang);
    document.documentElement.lang=lang;
    document.getElementById('lang-fr').classList.toggle('active', lang==='fr');
    document.getElementById('lang-en').classList.toggle('active', lang==='en');
    applyChrome(); render();
  }
  function applyChrome(){
    const u=UI[lang];
    document.querySelector('[data-i18n="subtitle"]').textContent=u.subtitle;
    document.querySelector('[data-i18n="backApp"]').textContent=u.backApp;
    document.getElementById('q').placeholder=u.searchPlaceholder;
    document.getElementById('lead').textContent=u.lead;
    document.getElementById('footerLinks').innerHTML=u.footerLinks;
    document.getElementById('footerNote').textContent=u.footerNote;
    const tabsEl=document.getElementById('tabs'); tabsEl.innerHTML='';
    ['all','public','family','skipper'].forEach(k=>{
      const b=document.createElement('button');
      b.className='tab'+(tab===k?' active':'');
      b.textContent=u.tabs[k];
      b.onclick=()=>{ tab=k; document.getElementById('q').value=''; applyChrome(); render(); };
      tabsEl.appendChild(b);
    });
  }
  function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  // bullets may contain trusted <b> tags from our own data — allow them through.
  function bul(s){ return esc(s).replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>'); }
  function cardHtml(s){
    const u=UI[lang];
    const lvlLabel=u.tabs[s.level].replace(/^[^\s]+\s/,'');
    let html=`<div class="card">`;
    html+=`<h3><span class="icon">${s.icon}</span>${esc(s.t[lang])} <span class="badge ${s.level}">${esc(lvlLabel)}</span></h3>`;
    html+=`<p class="desc">${esc(s.d[lang])}</p>`;
    if(s.bullets){ html+='<ul>'+s.bullets[lang].map(b=>`<li>${bul(b)}</li>`).join('')+'</ul>'; }
    if(s.note){ html+=`<p class="note">ℹ️ ${esc(s.note[lang])}</p>`; }
    if(s.shot){
      const nn=String(s.shot).padStart(2,'0');
      const cap=s.cap?esc(s.cap[lang]):'';
      html+=`<figure class="shot">`
        +`<a class="shotlink" href="/help-shots/${nn}.webp" target="_blank" rel="noopener"><img src="/help-shots/${nn}.webp" alt="${cap}" loading="lazy" onerror="this.closest('figure').querySelector('.shot-ph').style.display='flex';this.closest('a').style.display='none';"></a>`
        +`<div class="shot-ph" style="display:none"><span class="num">📸 #${nn}</span><span class="cap">${cap}</span><span class="path">${u.shotPath(s.shot)}</span></div>`
        +`<figcaption>#${nn} — ${cap} · ${u.zoom}</figcaption>`
        +`</figure>`;
    }
    html+=`</div>`;
    return html;
  }
  function render(){
    const u=UI[lang];
    const q=document.getElementById('q').value.trim().toLowerCase();
    let list=G.slice();
    if(q){
      list=list.filter(s=>{
        const hay=[s.t.fr,s.t.en,s.d.fr,s.d.en,
          (s.bullets?(s.bullets.fr.join(' ')+s.bullets.en.join(' ')):''),
          (s.note?s.note.fr+s.note.en:''),(s.cap?s.cap.fr+s.cap.en:'')].join(' ').toLowerCase();
        return hay.includes(q);
      });
    } else if(tab!=='all'){
      list=list.filter(s=>s.level===tab);
    }
    const cards=document.getElementById('cards');
    const none=document.getElementById('noResults');
    document.getElementById('count').textContent=u.count(list.length);
    if(!list.length){ cards.innerHTML=''; none.textContent=u.noResults; none.classList.remove('hidden'); return; }
    none.classList.add('hidden');
    cards.innerHTML=list.map(cardHtml).join('');
  }
  document.getElementById('q').addEventListener('input', render);
  (function init(){
    const p=new URLSearchParams(location.search).get('lang');
    setLang(p||localStorage.getItem('lang')||'fr');
  })();
  </script>
