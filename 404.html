      // V1.9.3 — emergency reset via ?reset=1 (or ?reset).
      // Self-service recovery for users whose PWA is stuck on a stale SW
      // (e.g., the V1.9.3-INC-1 Vercel DDoS challenge blocked sw.js update,
      // or any other SW lifecycle wedge). Append ?reset=1 to any URL —
      // unregisters every SW for this origin, deletes wangap-* caches,
      // strips the param and reloads from network.
      // Runs BEFORE the SW gate below so it works even when the SW is
      // currently active (because at this point the SW is just a fetch
      // interceptor; calling unregister() releases its claim before the
      // reload).
      (function () {
        try {
          var sp = new URLSearchParams(window.location.search);
          if (!sp.has('reset')) return;
          var done = function () {
            var clean = window.location.pathname + (window.location.hash || '');
            window.location.replace(clean);
          };
          var unreg = ('serviceWorker' in navigator)
            ? navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }).catch(function () {})
            : Promise.resolve();
          var clearCaches = ('caches' in window)
            ? caches.keys().then(function (ks) {
                return Promise.all(ks
                  .filter(function (k) { return k.indexOf('wangap-') === 0; })
                  .map(function (k) { return caches.delete(k); }));
              }).catch(function () {})
            : Promise.resolve();
          Promise.all([unreg, clearCaches]).then(done, done);
          // Safety: even if Promise.all hangs (rare), force reload after 4 s.
          setTimeout(done, 4000);
        } catch (_) { /* best effort */ }
      })();
